name: Release Client

on:
  push:
    tags:
      - 'client-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os: linux
            arch: x86_64
            rust-targets: ''
            tauri-args: ''
            binary: nooto

          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
            rust-targets: ''
            tauri-args: ''
            binary: nooto

          - runner: macos-latest
            os: macos
            arch: universal
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri-args: '--target universal-apple-darwin'
            binary: nooto

          - runner: windows-latest
            os: windows
            arch: x86_64
            rust-targets: ''
            tauri-args: ''
            binary: nooto.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            xdg-utils

      - name: Install frontend dependencies
        working-directory: client
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nooto ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          projectPath: client
          args: ${{ matrix.tauri-args }}

      - name: Create binary archive
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos" ]; then
            BIN_PATH="target/universal-apple-darwin/release/${{ matrix.binary }}"
          else
            BIN_PATH="target/release/${{ matrix.binary }}"
          fi
          ARCHIVE="nooto-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BIN_PATH")" "$(basename "$BIN_PATH")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup NDK toolchain wrappers
        run: |
          NDK_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          for TRIPLE in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android; do
            ln -sf $NDK_BIN/llvm-ranlib $NDK_BIN/$TRIPLE-ranlib
            ln -sf $NDK_BIN/llvm-ar     $NDK_BIN/$TRIPLE-ar
          done
          echo "$NDK_BIN" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        working-directory: client
        run: npm install

      - name: Setup Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ${{ runner.temp }}/nooto.keystore

      - name: Build Android APK
        working-directory: client
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npm run tauri android build -- --apk

      - name: Sign APK
        run: |
          UNSIGNED_APK=$(find client/src-tauri/gen/android -name "*.apk" | head -1)
          SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          "$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner" sign \
            --ks ${{ runner.temp }}/nooto.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          echo "SIGNED_APK=$SIGNED_APK" >> "$GITHUB_ENV"

      - name: Find APK artifacts
        run: |
          echo "APK_FILES=$SIGNED_APK" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Nooto ${{ github.ref_name }}'
          body: 'See the assets below to download and install this version.'
          draft: true
          prerelease: false
          files: ${{ env.APK_FILES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


